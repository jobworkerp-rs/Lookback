name: Release

# Triggered by the tag that scripts/sync-public.sh (run on the private gitea
# source) forwards to this public repository. Builds the signed macOS DMG first,
# then the Linux CPU bundles, and attaches them to the GitHub Release for the
# tag. The Linux CUDA AppImage is built on the self-hosted GPU runner and
# attached to the same GitHub Release with a `-cuda` suffix.
on:
  push:
    tags:
      - '*'

permissions:
  contents: write

# A re-pushed tag re-runs this; let a fresh run supersede an in-flight one
# without cancelling (avoid a half-uploaded release).
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
  CARGO_INCREMENTAL: '0'

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: fast guardrail checks. Release-gating integration tests run on the
  # gitea side before the tag is cut; this is a quick lint/unit pass.
  # ---------------------------------------------------------------------------
  test:
    name: Lint & unit test
    runs-on: lookback-linux-cuda
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config protobuf-compiler libprotobuf-dev \
            libssl-dev libdbus-1-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
          cache-on-failure: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Vitest
        run: pnpm test

      - name: Biome
        run: pnpm exec biome check src

      # tauri::generate_context! validates that frontendDist (../dist) exists at
      # compile time, so the frontend must be built before clippy/test. (The
      # build job gets this for free via tauri build's beforeBuildCommand.)
      - name: Build frontend (dist)
        run: pnpm build

      # tauri-build checks that externalBin/resources exist even for clippy/test
      # (which never run the binaries). This job doesn't run build-release.sh,
      # so stage empty placeholders to satisfy the existence check.
      - name: Stage CI placeholders
        run: bash scripts/ci-stage-placeholders.sh

      # build.rs runs tonic-prost-build, so protoc (installed above) is required
      # for clippy/test to compile the crate.
      - name: Clippy
        run: cargo clippy -p lookback-tauri --all-targets -- -D warnings

      # Unit/lib tests only: the tests/ integration suites can require the
      # sidecar binaries and a live DB which are absent here. --test-threads=1
      # because the keyring mock is installed process-wide.
      - name: Cargo test (unit/lib)
        run: cargo test -p lookback-tauri --lib --bins -- --test-threads=1

  # ---------------------------------------------------------------------------
  # Stage 2: signed macOS release build (DMG).
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build macOS DMG
    needs: test
    runs-on: [self-hosted, macOS, lookback-macos]
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install protobuf cmake pkgconf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-macos
          cache-on-failure: true
          workspaces: |
            .
            .build-deps/jobworkerp-rs
            .build-deps/memory-store
            .build-deps/jobworkerp-conductor
            .build-deps/llama-cpp-runner
            .build-deps/mm-embedding-runner

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache lindera artifacts
        uses: actions/cache@v4
        with:
          path: .build-deps/.lindera-cache
          key: lindera-${{ runner.os }}-x86_64-v0.44.1

      - name: Import Apple signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Verify Apple signing identity
        run: |
          set -euo pipefail
          security find-identity -v -p codesigning
          security find-identity -v -p codesigning | grep -F -- "${APPLE_SIGNING_IDENTITY}" >/dev/null \
            || { echo "APPLE_SIGNING_IDENTITY not found in keychain" >&2; exit 1; }
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      - name: Verify Apple notarization credentials
        run: |
          set -euo pipefail
          xcrun notarytool history \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json >/dev/null
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build signed macOS bundles
        run: bash scripts/build-release.sh --profile mac
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Notarize macOS DMG
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(target/release/bundle/dmg/*.dmg)
          [ ${#dmgs[@]} -gt 0 ] || { echo "no .dmg produced" >&2; exit 1; }
          for dmg in "${dmgs[@]}"; do
            if xcrun stapler validate "$dmg" >/dev/null 2>&1; then
              echo "notarization ticket already stapled: $dmg"
              continue
            fi
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$dmg"
          done
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify artifacts
        run: |
          set -euo pipefail
          out=target/release/bundle
          ls -la "$out/dmg" "$out/macos" || true
          shopt -s nullglob
          dmgs=("$out"/dmg/*.dmg)
          apps=("$out"/macos/*.app)
          [ ${#dmgs[@]} -gt 0 ] || { echo "no .dmg produced" >&2; exit 1; }
          [ ${#apps[@]} -gt 0 ] || { echo "no .app produced" >&2; exit 1; }
          for app in "${apps[@]}"; do
            codesign --verify --deep --strict --verbose=2 "$app"
            find "$app/Contents/Resources/plugins" -name '*.dylib' \
              -exec codesign --verify --verbose=2 {} \;
          done
          for dmg in "${dmgs[@]}"; do
            codesign --verify --verbose=2 "$dmg"
            xcrun stapler validate "$dmg"
            spctl -a -t open --context context:primary-signature -vv "$dmg"
          done

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            target/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Stage 3: Linux CUDA AppImage build on the self-hosted GPU runner.
  # ---------------------------------------------------------------------------
  build-cuda:
    name: Build Linux AppImage (cuda)
    needs: test
    runs-on: lookback-linux-cuda
    timeout-minutes: 180
    defaults:
      run:
        shell: bash
    env:
      PUBLIC_REPO: jobworkerp-rs/Lookback
      RUSTFLAGS: "-C relocation-model=pic"
      CFLAGS: "-fPIC"
      CXXFLAGS: "-fPIC"
      CMAKE_POSITION_INDEPENDENT_CODE: "ON"
      APPIMAGE_EXTRACT_AND_RUN: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: github-cuda
          cache-on-failure: true
          workspaces: |
            .
            .build-deps/jobworkerp-rs
            .build-deps/memory-store
            .build-deps/jobworkerp-conductor
            .build-deps/llama-cpp-runner
            .build-deps/mm-embedding-runner

      - name: Cache lindera artifacts
        uses: actions/cache@v4
        with:
          path: .build-deps/.lindera-cache
          key: lindera-linux-x86_64-v0.44.1

      - name: Pin CUDA compute capability
        if: vars.CUDA_COMPUTE_CAP != ''
        run: echo "CUDA_COMPUTE_CAP=${{ vars.CUDA_COMPUTE_CAP }}" >> "$GITHUB_ENV"

      - name: Disable NCCL detection for CUDA build
        run: |
          set -e
          for header in $(find /usr /opt/cuda /usr/local/cuda -name 'nccl.h' 2>/dev/null); do
            echo "Hiding NCCL header: $header"
            sudo mv "$header" "${header}.disabled-for-build"
          done
          for lib in $(find /usr /opt/cuda /usr/local/cuda -name 'libnccl*' 2>/dev/null); do
            echo "Hiding NCCL library: $lib"
            sudo mv "$lib" "${lib}.disabled-for-build"
          done

      - name: Build release AppImage (cuda)
        run: bash scripts/build-release.sh --profile linux-cuda --bundle appimage

      - name: Rename artifacts with -cuda suffix
        run: |
          set -euo pipefail
          out=target/release/bundle
          shopt -s nullglob
          for f in "$out"/appimage/*.AppImage; do
            mv "$f" "${f%.AppImage}-cuda.AppImage"
          done
          appimages=("$out"/appimage/*-cuda.AppImage)
          [ ${#appimages[@]} -gt 0 ] || { echo "no -cuda .AppImage produced" >&2; exit 1; }

      - name: Upload CUDA bundles to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          out=target/release/bundle
          gh release view "${TAG}" -R "${PUBLIC_REPO}" >/dev/null 2>&1 \
            || gh release create "${TAG}" -R "${PUBLIC_REPO}" \
                 --title "${TAG}" --notes "Release ${TAG}" \
                 $([ "${TAG#*-}" != "${TAG}" ] && echo --prerelease)
          gh release upload "${TAG}" -R "${PUBLIC_REPO}" --clobber \
            "$out"/appimage/*-cuda.AppImage

  # ---------------------------------------------------------------------------
  # Stage 4: Linux CPU release build after CUDA on the same self-hosted runner pool.
  # ---------------------------------------------------------------------------
  build:
    name: Build Linux bundles (cpu)
    needs: [test, build-cuda]
    runs-on: lookback-linux-cuda
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: bash scripts/ci-free-disk-space.sh

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential mold clang cmake pkg-config protobuf-compiler libprotobuf-dev \
            curl unzip tar git ca-certificates \
            libssl-dev libdbus-1-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            fuse libfuse2 file desktop-file-utils
          # build-release.sh patches the generated AppImage runtime hook and
          # repackages it, so appimagetool is required even for CPU builds.
          sudo curl -fsSL -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool
          command -v appimagetool >/dev/null || { echo "appimagetool missing" >&2; exit 1; }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      # Cache this crate's target plus each dependency repo's target dir (cloned
      # by build-release.sh into .build-deps/<repo>). The dep repos track main,
      # so an upstream move busts only that repo's cache entry.
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build
          cache-on-failure: true
          workspaces: |
            .
            .build-deps/jobworkerp-rs
            .build-deps/memory-store
            .build-deps/jobworkerp-conductor
            .build-deps/llama-cpp-runner
            .build-deps/mm-embedding-runner

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # The lindera CLI + IPADIC source CSV are downloaded each run; cache them.
      - name: Cache lindera artifacts
        uses: actions/cache@v4
        with:
          path: .build-deps/.lindera-cache
          key: lindera-${{ runner.os }}-x86_64-v0.44.1

      - name: Build release bundles (cpu)
        run: bash scripts/build-release.sh --platform linux --gpu cpu --bundle deb,appimage

      - name: Verify artifacts
        run: |
          set -euo pipefail
          out=target/release/bundle
          ls -la "$out/deb" "$out/appimage" || true
          shopt -s nullglob
          debs=("$out"/deb/*.deb)
          appimages=("$out"/appimage/*.AppImage)
          [ ${#debs[@]} -gt 0 ] || { echo "no .deb produced" >&2; exit 1; }
          [ ${#appimages[@]} -gt 0 ] || { echo "no .AppImage produced" >&2; exit 1; }

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # A hyphenated tag (v1.0.0-rc1 / -beta) is treated as a prerelease.
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
